<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Geography Drill — Countries & US Cities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe6;
    --ink: #1a1a1a;
    --ink-soft: #5c5c5c;
    --accent: #c13a2a;
    --good: #2d7a4a;
    --good-soft: #cfe4d4;
    --bad: #c13a2a;
    --bad-soft: #efd3cf;
    --line: #1a1a1a;
    --card: #ffffff;
    --map-land: #e8dfd0;
    --map-line: #9a8f7c;
    --map-ocean: transparent;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
  }
  body { overflow-x: hidden; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 60px; }
  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 2px solid var(--line); padding-bottom: 14px; margin-bottom: 22px;
    gap: 20px; flex-wrap: wrap;
  }
  h1 { font-size: 36px; margin: 0; letter-spacing: -0.02em; font-weight: 800; }
  h1 .sub { font-size: 14px; color: var(--ink-soft); font-weight: 400; margin-left: 10px; letter-spacing: 0.02em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .nav { display: flex; gap: 6px; flex-wrap: wrap; }
  .nav button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    background: transparent; color: var(--ink);
    border: 1.5px solid var(--line); padding: 8px 14px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
    transition: background .15s, color .15s;
  }
  .nav button:hover { background: var(--ink); color: var(--bg); }
  .nav button.active { background: var(--ink); color: var(--bg); }

  /* Home screen */
  .home {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 18px; margin-top: 10px;
  }
  .card {
    background: var(--card); border: 1.5px solid var(--line); padding: 24px;
    cursor: pointer; transition: transform .12s ease, box-shadow .12s ease;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 220px;
  }
  .card:hover { transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--line); }
  .card h2 { font-size: 26px; margin: 0 0 8px; letter-spacing: -0.01em; }
  .card p { color: var(--ink-soft); font-size: 15px; margin: 0 0 20px; line-height: 1.5; }
  .card .count {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 6px 10px; background: var(--ink); color: var(--bg);
    align-self: flex-start;
  }

  /* Quiz screen */
  .quiz-top {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .quiz-title { font-size: 24px; margin: 0; letter-spacing: -0.01em; }
  .quiz-title .difficulty-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 3px 8px; margin-left: 10px; vertical-align: middle;
    border: 1.5px solid var(--line);
  }
  .quiz-title .difficulty-tag.easy { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .quiz-title .difficulty-tag.hard { background: var(--bad-soft); color: var(--bad); border-color: var(--bad); }
  .stats {
    display: flex; gap: 20px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; letter-spacing: 0.04em;
  }
  .stats .label { color: var(--ink-soft); text-transform: uppercase; font-size: 11px; display: block; margin-bottom: 2px; }
  .stats .val { font-size: 20px; font-weight: 600; }
  .stats .val.score { color: var(--good); }
  .stats .val.time { color: var(--ink); }

  /* Layout */
  .layout {
    display: grid; grid-template-columns: 1fr 340px; gap: 22px;
  }
  @media (max-width: 920px) {
    .layout { grid-template-columns: 1fr; }
  }
  .map-wrap {
    background: var(--card); border: 1.5px solid var(--line);
    padding: 8px; position: relative;
    min-height: 420px;
  }
  .map-wrap svg { width: 100%; height: auto; display: block; }
  .map-wrap .flash {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    padding: 6px 12px; border: 1.5px solid var(--line);
    background: var(--card); pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  .map-wrap .flash.show { opacity: 1; }
  .map-wrap .flash.good { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .map-wrap .flash.dup  { background: #fff4d6; color: #8a6400; border-color: #8a6400; }
  .map-wrap .flash.bad  { background: var(--bad-soft);  color: var(--bad);  border-color: var(--bad); }

  /* Hard mode: hide map area entirely (it's still in the DOM, just collapsed) */
  .map-wrap.hidden-hard { display: none; }
  /* Hard mode: input box should expand to fill the row */
  .layout.hard-active { grid-template-columns: 1fr; }

  /* Pre-start overlay on map */
  .map-overlay {
    position: absolute; inset: 0;
    background: rgba(244, 239, 230, 0.92);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    text-align: center; padding: 20px;
    z-index: 5;
  }
  .map-overlay .ov-title {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft);
  }
  .map-overlay .ov-msg {
    font-family: 'Fraunces', Georgia, serif; font-size: 22px;
    color: var(--ink); max-width: 420px; line-height: 1.4;
  }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 14px; }
  .input-box {
    background: var(--card); border: 1.5px solid var(--line); padding: 16px;
  }
  .input-box label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft);
    display: block; margin-bottom: 8px;
  }
  .input-box input {
    width: 100%; font-family: 'Fraunces', Georgia, serif; font-size: 18px;
    padding: 10px 12px; border: 1.5px solid var(--line); background: var(--bg);
    color: var(--ink); outline: none;
  }
  .input-box input:focus { border-color: var(--accent); }
  .input-box input:disabled { opacity: 0.5; cursor: not-allowed; background: #ebe6dc; }

  /* Difficulty toggle */
  .difficulty {
    display: flex; gap: 0; margin-bottom: 12px;
    border: 1.5px solid var(--line);
  }
  .difficulty button {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    padding: 10px 8px; border: none; background: transparent; color: var(--ink);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em;
    transition: background .12s, color .12s;
    border-right: 1.5px solid var(--line);
  }
  .difficulty button:last-child { border-right: none; }
  .difficulty button:hover:not(:disabled) { background: rgba(0,0,0,0.05); }
  .difficulty button.active { background: var(--ink); color: var(--bg); }
  .difficulty button:disabled { cursor: not-allowed; opacity: 0.6; }
  .difficulty-help {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-soft); margin-top: -6px; margin-bottom: 12px;
    line-height: 1.4; min-height: 14px;
  }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-row button {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    padding: 10px; border: 1.5px solid var(--line); background: transparent;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em;
    transition: background .12s, color .12s;
  }
  .btn-row button:hover:not(:disabled) { background: var(--ink); color: var(--bg); }
  .btn-row button.primary { background: var(--ink); color: var(--bg); }
  .btn-row button.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
  .btn-row button.danger { color: var(--bad); border-color: var(--bad); }
  .btn-row button.danger:hover:not(:disabled) { background: var(--bad); color: var(--bg); border-color: var(--bad); }
  .btn-row button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress bar */
  .prog {
    height: 8px; background: var(--bg); border: 1.5px solid var(--line); position: relative;
  }
  .prog .fill { height: 100%; background: var(--good); width: 0%; transition: width .3s; }

  /* Answer list */
  .list-box {
    background: var(--card); border: 1.5px solid var(--line); padding: 14px;
    max-height: 320px; overflow-y: auto;
  }
  .list-box.hidden-hard { display: none; }
  .list-box h3 {
    margin: 0 0 10px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft);
  }
  .list-box .pills {
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 3px 8px; border: 1px solid var(--line);
    background: var(--bg);
  }
  .pill.got     { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .pill.missed  { background: var(--bad-soft);  color: var(--bad);  border-color: var(--bad); }

  /* Map visual styles */
  .country { fill: var(--map-land); stroke: var(--map-line); stroke-width: 0.4; transition: fill .25s; }
  .country.answered { fill: var(--good); }
  .country.missed { fill: var(--bad); }
  /* Capitals quiz: subtle tint on the country whose capital was named */
  .country.capital-answered { fill: #cfe4d4; }
  .state { fill: var(--map-land); stroke: var(--map-line); stroke-width: 0.6; }
  .city-dot { fill: var(--good); stroke: var(--card); stroke-width: 1.2; }
  .city-dot.missed { fill: var(--bad); }
  /* Metros: county-level fills on US map */
  .county-metro { fill: var(--map-land); stroke: var(--map-line); stroke-width: 0.25; transition: fill .25s; }
  .county-metro.answered { fill: var(--good); }
  .county-metro.missed { fill: var(--bad); }
  .state-border { fill: none; stroke: var(--ink); stroke-width: 0.7; pointer-events: none; }

  /* State grid (top-3 quiz) */
  .state-grid {
    margin-top: 18px; display: grid;
    grid-template-columns: repeat(5, 1fr); gap: 8px;
    background: var(--card); border: 1.5px solid var(--line); padding: 12px;
  }
  @media (max-width: 920px) {
    .state-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .state-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .state-cell { border: 1px solid var(--line); background: var(--bg); overflow: hidden; }
  .state-cell .st-name {
    background: var(--ink); color: var(--bg);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    text-align: center; padding: 4px 2px; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--line);
  }
  .state-cell .st-slot {
    font-family: 'Fraunces', Georgia, serif; font-size: 13px;
    padding: 4px 8px; min-height: 22px; border-bottom: 1px dashed #ccc;
    color: var(--ink-soft); line-height: 1.2;
  }
  .state-cell .st-slot:last-child { border-bottom: none; }
  .state-cell .st-slot.got { color: var(--good); font-weight: 600; }
  .state-cell .st-slot.missed { color: var(--bad); font-style: italic; }
  .state-cell .st-pop {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-soft); font-weight: 400; margin-left: 4px;
  }
  .state-cell .st-slot.got .st-pop  { color: var(--good); }
  .state-cell .st-slot.missed .st-pop { color: var(--bad); }
  .state-grid.hidden-hard { display: none; }

  /* Ranked tables (countries & top-200) */
  .rank-table {
    margin-top: 18px; background: var(--card); border: 1.5px solid var(--line); padding: 14px;
  }
  .rank-table.hidden-hard { display: none; }
  .rank-table h3 {
    margin: 0 0 12px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft);
  }
  .rank-cols {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  @media (max-width: 800px) { .rank-cols { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .rank-cols { grid-template-columns: 1fr; } }
  .rank-row {
    display: grid; grid-template-columns: 32px 1fr auto; gap: 6px;
    padding: 3px 4px; font-size: 13px; line-height: 1.3;
    border-bottom: 1px dotted #ddd;
    align-items: baseline;
  }
  .rank-row .r-n {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-soft); text-align: right;
  }
  .rank-row .r-name { color: var(--ink-soft); }
  .rank-row .r-pop {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-soft);
  }
  .rank-row.got .r-name { color: var(--good); font-weight: 600; }
  .rank-row.got .r-pop  { color: var(--good); }
  .rank-row.missed .r-name { color: var(--bad); font-style: italic; }
  .rank-row.missed .r-pop  { color: var(--bad); }

  /* State breakdown table (Top 200 only) */
  .state-breakdown {
    margin-top: 18px; background: var(--card); border: 1.5px solid var(--line); padding: 14px;
  }
  .state-breakdown.hidden-hard { display: none; }
  .state-breakdown h3 {
    margin: 0 0 12px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft);
  }
  .sb-grid {
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: repeat(4, auto);
    grid-auto-columns: minmax(90px, 1fr);
    gap: 6px 14px;
    overflow-x: auto;
  }
  @media (max-width: 800px) { .sb-grid { grid-template-rows: repeat(6, auto); } }
  @media (max-width: 500px) { .sb-grid { grid-template-rows: repeat(10, auto); } }
  .sb-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 3px 0; border-bottom: 1px dotted #ddd;
  }
  .sb-row .sb-abbr { font-weight: 600; color: var(--ink); }
  .sb-row .sb-count { color: var(--ink-soft); }
  .sb-row.complete { background: var(--good-soft); padding: 3px 6px; border-bottom-color: var(--good); }
  .sb-row.complete .sb-abbr,
  .sb-row.complete .sb-count { color: var(--good); }
  .sb-row.partial .sb-count { color: var(--ink); font-weight: 600; }

  /* Map insets (countries quiz) */
  .insets {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 8px;
  }
  @media (max-width: 700px) {
    .insets { grid-template-columns: 1fr; }
  }
  .inset {
    border: 1px solid var(--line); background: var(--bg);
    padding: 6px; position: relative;
  }
  .inset .inset-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft);
    font-weight: 600; margin-bottom: 4px; padding: 0 2px;
  }
  .inset svg { width: 100%; height: auto; display: block; }

  /* Continent breakdown (Countries quiz) */
  .continent-breakdown {
    margin-top: 18px; background: var(--card); border: 1.5px solid var(--line); padding: 14px;
  }
  .continent-breakdown.hidden-hard { display: none; }
  .continent-breakdown h3 {
    margin: 0 0 12px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft);
  }
  .cb-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, auto); gap: 10px;
  }
  @media (max-width: 700px) { .cb-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, auto); } }
  @media (max-width: 460px) { .cb-grid { grid-template-columns: 1fr; grid-template-rows: auto; } }
  .cb-cell {
    border: 1px solid var(--line); background: var(--bg);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 4px;
  }
  .cb-cell .cb-name {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); font-weight: 600;
  }
  .cb-cell .cb-count {
    font-family: 'Fraunces', Georgia, serif; font-size: 22px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .cb-cell .cb-left {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft);
  }
  .cb-cell.complete { background: var(--good-soft); border-color: var(--good); }
  .cb-cell.complete .cb-name,
  .cb-cell.complete .cb-count,
  .cb-cell.complete .cb-left { color: var(--good); }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* Results overlay */
  .results-banner {
    background: var(--card); border: 1.5px solid var(--line); padding: 20px;
    margin-bottom: 14px; display: none;
  }
  .results-banner.show { display: block; }
  .results-banner h3 { margin: 0 0 6px; font-size: 22px; }
  .results-banner p { margin: 0; color: var(--ink-soft); font-size: 15px; }
  .results-banner .big {
    font-family: 'JetBrains Mono', monospace; font-size: 32px;
    font-weight: 600; color: var(--ink);
  }

  /* Tooltip on hover */
  .tip {
    position: fixed; pointer-events: none;
    background: var(--ink); color: var(--bg); padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    opacity: 0; transition: opacity .15s;
    z-index: 100;
  }
  .tip.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Geography Drill <span class="sub">2024 data</span></h1>
    <nav class="nav" id="nav"></nav>
  </header>

  <main id="main"></main>
</div>

<div class="tip" id="tip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<!-- Quiz data (loaded as window.* globals) -->
<script src="data/top200.js"></script>
<script src="data/sc200.js"></script>
<script src="data/top3.js"></script>
<script src="data/countries.js"></script>
<script src="data/metros100.js"></script>
<script src="data/capitals.js"></script>
<script src="data/lowcountry.js"></script>

<script>
/* =========================================================================
   Bind window.* data globals to local consts used throughout this file.
   ========================================================================= */
const TOP200 = window.TOP200;
const SC200 = window.SC200;
const TOP3 = window.TOP3;
const COUNTRIES = window.COUNTRIES;
const CONTINENT_OF = window.CONTINENT_OF;
const CONTINENT_ORDER = window.CONTINENT_ORDER;
const METROS100 = window.METROS100;
const LOWCOUNTRY = window.LOWCOUNTRY;
// CAPITALS is bound below (after the pre-CAPITALS logic that already references window.CAPITALS).

// Disputed/dependent territories that share fill state with a sovereign country.
const DISPUTED_TERRITORIES = {
  "732": "504",  // Western Sahara -> Morocco
  "304": "208",  // Greenland      -> Denmark
  "-99": "383",  // Unrecognized polygon (often Kosovo on world-atlas) -> Kosovo
};

/* =========================================================================
   TOP 100 US METROS — OMB Bulletin 23-01, July 2023 delineations
   2024 Census population estimates
   Each entry: [displayName, pop, [aliases for matching], [5-digit county FIPS]]
   Notes:
   - Connecticut MSAs: us-atlas data uses traditional 8 CT counties, so
     CT MSAs here are mapped to traditional county FIPS approximations.
   - Some smaller outlying counties may need correction.
   ========================================================================= */

/* =========================================================================
   NORMALIZATION & MATCHING
   ========================================================================= */
function norm(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[.'’`]/g, '')
    .replace(/\bst\b/g, 'saint')
    .replace(/\band\b/g, '')
    .replace(/[^a-z0-9]+/g, '')
    .trim();
}

const STATE_FULL = {
  AL:'alabama',AK:'alaska',AZ:'arizona',AR:'arkansas',CA:'california',CO:'colorado',CT:'connecticut',
  DE:'delaware',DC:'district of columbia',FL:'florida',GA:'georgia',HI:'hawaii',ID:'idaho',IL:'illinois',
  IN:'indiana',IA:'iowa',KS:'kansas',KY:'kentucky',LA:'louisiana',ME:'maine',MD:'maryland',MA:'massachusetts',
  MI:'michigan',MN:'minnesota',MS:'mississippi',MO:'missouri',MT:'montana',NE:'nebraska',NV:'nevada',
  NH:'new hampshire',NJ:'new jersey',NM:'new mexico',NY:'new york',NC:'north carolina',ND:'north dakota',
  OH:'ohio',OK:'oklahoma',OR:'oregon',PA:'pennsylvania',RI:'rhode island',SC:'south carolina',
  SD:'south dakota',TN:'tennessee',TX:'texas',UT:'utah',VT:'vermont',VA:'virginia',WA:'washington',
  WV:'west virginia',WI:'wisconsin',WY:'wyoming'
};

/* =========================================================================
   STATE
   =========================================================================
   quizState gains:
   - phase: 'idle' | 'running' | 'paused' | 'ended'
   - difficulty: 'easy' | 'hard'    (only meaningful for countries / top200)
   - elapsedMs: accumulated time (so pause/resume works properly)
   - hasDifficulty: bool — does this quiz expose easy/hard?
*/

let quizState = null;

function setMode(m) {
  currentMode = m;
  if (quizState && quizState.timerId) { clearInterval(quizState.timerId); }
  quizState = null;
  renderNav();
  if (m === 'home') renderHome();
  else if (m === 'countries') startCountries();
  else if (m === 'capitals') startCapitals();
  else if (m === 'top200') startTop200();
  else if (m === 'states3') startStates3();
  else if (m === 'metros100') startMetros100();

function updateDifficultyTag() {
  if (!quizState || !quizState.hasDifficulty) return;
  const titleEl = document.getElementById('quiz-title-el');
  if (!titleEl) return;
  // Remove any existing tag
  const existing = titleEl.querySelector('.difficulty-tag');
  if (existing) existing.remove();
  // Only show tag once quiz is running/paused/ended
  if (quizState.phase === 'idle') return;
  const tag = document.createElement('span');
  tag.className = 'difficulty-tag ' + quizState.difficulty;
  tag.textContent = quizState.difficulty;
  titleEl.appendChild(tag);
}

function applyDifficultyVisibility() {
  if (!quizState) return;
  const isHardActive = quizState.hasDifficulty
    && quizState.difficulty === 'hard'
    && (quizState.phase === 'running' || quizState.phase === 'paused');
  // Map area
  document.getElementById('map-wrap')?.classList.toggle('hidden-hard', isHardActive);
  // Layout collapses to single column when map hidden
  document.getElementById('layout')?.classList.toggle('hard-active', isHardActive);
  // Side lists
  document.getElementById('list-box')?.classList.toggle('hidden-hard', isHardActive);
  document.getElementById('rank-table')?.classList.toggle('hidden-hard', isHardActive);
  document.getElementById('continent-breakdown')?.classList.toggle('hidden-hard', isHardActive);
  document.getElementById('state-breakdown')?.classList.toggle('hidden-hard', isHardActive);
  document.getElementById('state-grid')?.classList.toggle('hidden-hard', isHardActive);
}

function flash(msg, kind) {
  const el = document.getElementById('flash');
  if (!el) return;
  el.textContent = msg;
  el.className = 'flash show ' + kind;
  clearTimeout(flash._t);
  flash._t = setTimeout(() => { el.classList.remove('show'); }, 1500);
}
function updateStats() {
  const { got, items } = quizState;
  document.getElementById('score').textContent = `${got.size} / ${items.length}`;
  document.getElementById('fill').style.width = (100 * got.size / items.length) + '%';
}

/* Timer that supports pause/resume via accumulated elapsedMs */
function tickTime() {
  if (!quizState || quizState.phase !== 'running') return;
  const now = Date.now();
  const ms = quizState.elapsedMs + (now - quizState.runStartedAt);
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60), ss = String(s % 60).padStart(2, '0');
  document.getElementById('time').textContent = `${m}:${ss}`;
}

function startTimer() {
  // Called once when the quiz initially starts (Start button)
  quizState.elapsedMs = 0;
  quizState.runStartedAt = Date.now();
  quizState.phase = 'running';
  quizState.timerId = setInterval(tickTime, 500);
  tickTime();
}
function pauseTimer() {
  if (!quizState || quizState.phase !== 'running') return;
  // Bank current run into elapsedMs
  quizState.elapsedMs += Date.now() - quizState.runStartedAt;
  quizState.phase = 'paused';
}
function resumeTimer() {
  if (!quizState || quizState.phase !== 'paused') return;
  quizState.runStartedAt = Date.now();
  quizState.phase = 'running';
}

function endQuiz(message) {
  // Bank time if currently running
  if (quizState.phase === 'running') {
    quizState.elapsedMs += Date.now() - quizState.runStartedAt;
  }
  quizState.phase = 'ended';
  clearInterval(quizState.timerId);

  const { got, items } = quizState;
  const pct = Math.round(100 * got.size / items.length);
  const ms = quizState.elapsedMs;
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60), ss = String(s % 60).padStart(2, '0');
  document.getElementById('time').textContent = `${m}:${ss}`;
  document.getElementById('results').innerHTML = `
    <h3>${message}</h3>
    <p><span class="big">${got.size} / ${items.length}</span> &nbsp; (${pct}%) &nbsp; in ${m}:${ss}</p>
  `;
  document.getElementById('results').classList.add('show');
  document.getElementById('ans').disabled = true;
  document.getElementById('pausebtn').disabled = true;
  document.getElementById('giveup').disabled = true;
  document.getElementById('startbtn').disabled = true;

  // For hard mode: now reveal the map and side panels
  if (quizState.hasDifficulty && quizState.difficulty === 'hard') {
    document.getElementById('map-wrap')?.classList.remove('hidden-hard');
    document.getElementById('layout')?.classList.remove('hard-active');
    document.getElementById('list-box')?.classList.remove('hidden-hard');
    document.getElementById('rank-table')?.classList.remove('hidden-hard');
    document.getElementById('continent-breakdown')?.classList.remove('hidden-hard');
    document.getElementById('state-breakdown')?.classList.remove('hidden-hard');
    document.getElementById('state-grid')?.classList.remove('hidden-hard');
    // Replay all credited answers onto the now-visible map (cities only)
    if (quizState.kind === 'countries' || quizState.kind === 'metros100') {
      // Countries/metros: SVG classes were already applied during play (even hidden)
      // Re-assert just in case
      if (quizState.kind === 'countries') {
        quizState.got.forEach(i => {
          const iso = COUNTRIES[i][1];
          d3.selectAll(`path.country[data-iso="${iso}"]`).classed('answered', true);
          for (const [terrIso, ownerIso] of Object.entries(DISPUTED_TERRITORIES)) {
            if (ownerIso === iso) {
              d3.selectAll(`path.country[data-iso="${terrIso}"]`).classed('answered', true);
            }
          }
        });
      } else {
        quizState.got.forEach(i => {
          METROS100[i][3].forEach(f => {
            d3.selectAll(`path.county-metro[data-fips="${f}"]`).classed('answered', true);
          });
        });
      }
    } else {
      quizState.got.forEach(i => placeCityDot(quizState.items[i], false));
    }
    // Update side breakdown panels with current state
    updateStateBreakdown();
    updateContinentBreakdown();
    // Reveal the rank-table rows that were credited (rows have been silently held)
    quizState.got.forEach(i => {
      const row = document.querySelector(`#rank-table .rank-row[data-item-idx="${i}"]`);
      if (row) {
        row.classList.add('got');
        row.querySelector('.r-name').textContent = row.dataset.name;
      }
    });
  }

  revealMissed();
  updatePills(true);
}

async function startCountries() {
  renderQuizShell({
    title: 'Countries of the World',

    hasDifficulty: true
  });
  document.getElementById('main').insertAdjacentHTML('afterbegin',
    '<div class="loading" id="ld">Loading world map…</div>');

  const keyMap = new Map();
  const addKey = (k, i) => {
    if (!keyMap.has(k)) keyMap.set(k, []);
    keyMap.get(k).push(i);
  };
  COUNTRIES.forEach(([name, iso, aliases], i) => {
    addKey(norm(name), i);
    (aliases || []).forEach(a => addKey(norm(a), i));
  });

  quizState = {
    kind: 'countries',
    items: COUNTRIES,
    got: new Set(),
    keyMap,
    elapsedMs: 0,
    runStartedAt: 0,
    timerId: null,
    phase: 'idle',
    difficulty: 'easy',
    hasDifficulty: true,
    isoToIdx: new Map(COUNTRIES.map(([n,iso],i) => [iso, i])),
  };

  try {
    const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
    document.getElementById('ld')?.remove();
    drawWorldMap(world);
    const mapWrap = document.querySelector('.map-wrap');
    const insetsRow = document.createElement('div');
    insetsRow.className = 'insets';
    insetsRow.innerHTML = INSET_DEFS.map(def =>
      `<div class="inset"><div class="inset-label">${def.label}</div><svg id="${def.id}"></svg></div>`
    ).join('');
    mapWrap.appendChild(insetsRow);
    drawInsets();
    renderContinentBreakdown();
    renderRankTable('countries', COUNTRIES.map((c, i) => ({
      idx: i, name: c[0], pop: c[3] || 0
    })), 'Countries by Population (2023)');
    wireInputs();
    wireStartPause();
    wireDifficulty();
    updateStats();
    updatePills(false);
  } catch (e) {
    console.error('Countries quiz load error:', e);
    const ld = document.getElementById('ld');
    if (ld) ld.innerHTML = 'Failed to load world map: ' + e.message + '<br><small>Check internet connection and reload.</small>';
  }
}

function drawWorldMap(world) {
  const svg = d3.select('#world-map');
  const W = 960, H = 500;
  svg.attr('viewBox', `0 0 ${W} ${H}`);
  const proj = d3.geoNaturalEarth1().fitSize([W, H], topojson.feature(world, world.objects.countries));
  const path = d3.geoPath(proj);

  const countries = topojson.feature(world, world.objects.countries).features;
  svg.selectAll('path.country')
    .data(countries)
    .join('path')
    .attr('class', 'country')
    .attr('d', path)
    .attr('data-iso', d => String(d.id).padStart(3, '0'))
    .on('mousemove', function(ev, d) {
      const iso = String(d.id).padStart(3,'0');
      const idx = quizState.isoToIdx.get(iso);
      if (idx != null && quizState.got.has(idx)) {
        const tip = document.getElementById('tip');
        tip.textContent = COUNTRIES[idx][0];
        tip.style.left = (ev.clientX + 12) + 'px';
        tip.style.top  = (ev.clientY + 12) + 'px';
        tip.classList.add('show');
      }
    })
    .on('mouseout', () => document.getElementById('tip').classList.remove('show'));

  quizState.worldFeatures = countries;
}

const INSET_DEFS = [
  { id: 'inset-europe', label: 'Europe', center: [12, 52], scale: 340 },
  { id: 'inset-caribbean', label: 'Caribbean', center: [-69, 17], scale: 900 },
  { id: 'inset-pacific', label: 'Pacific', center: [0, -8], scale: 320, rotate: [-180, 0] }
];

function drawInsets() {
  const features = quizState.worldFeatures;
  if (!features) return;

  INSET_DEFS.forEach(def => {
    const svg = d3.select('#' + def.id);
    svg.selectAll('*').remove();
    const W = 320, H = 220;
    svg.attr('viewBox', `0 0 ${W} ${H}`)
       .attr('preserveAspectRatio', 'xMidYMid slice');

    const clipId = def.id + '-clip';
    svg.append('defs').append('clipPath')
      .attr('id', clipId)
      .append('rect')
      .attr('x', 0).attr('y', 0).attr('width', W).attr('height', H);

    svg.append('rect')
      .attr('width', W).attr('height', H)
      .attr('fill', 'var(--bg)');

    const proj = d3.geoMercator()
      .scale(def.scale)
      .translate([W / 2, H / 2]);
    if (def.rotate) proj.rotate(def.rotate);
    proj.center(def.center);

    const path = d3.geoPath(proj);

    const mapG = svg.append('g').attr('clip-path', `url(#${clipId})`);

    mapG.selectAll('path.country')
      .data(features)
      .join('path')
      .attr('class', 'country')
      .attr('d', path)
      .attr('data-iso', d => String(d.id).padStart(3, '0'))
      .on('mousemove', function(ev, d) {
        const iso = String(d.id).padStart(3,'0');
        const idx = quizState.isoToIdx.get(iso);
        if (idx != null && quizState.got.has(idx)) {
          const tip = document.getElementById('tip');
          tip.textContent = COUNTRIES[idx][0];
          tip.style.left = (ev.clientX + 12) + 'px';
          tip.style.top  = (ev.clientY + 12) + 'px';
          tip.classList.add('show');
        }
      })
      .on('mouseout', () => document.getElementById('tip').classList.remove('show'));

    quizState.got.forEach(i => {
      const iso = COUNTRIES[i][1];
      svg.selectAll(`path.country[data-iso="${iso}"]`).classed('answered', true);
      for (const [terrIso, ownerIso] of Object.entries(DISPUTED_TERRITORIES)) {
        if (ownerIso === iso) {
          svg.selectAll(`path.country[data-iso="${terrIso}"]`).classed('answered', true);
        }
      }
    });
  });
}

function drawMetrosMap(us) {
  const svg = d3.select('#us-map');
  const W = 960, H = 600;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  const states = topojson.feature(us, us.objects.states);
  const counties = topojson.feature(us, us.objects.counties);
  // Filter out non-50-state-plus-DC counties (e.g., territories) by FIPS prefix
  const valid = counties.features.filter(f => {
    const fips = String(f.id).padStart(5, '0');
    const state = fips.slice(0, 2);
    // Exclude territories (60-78); include DC (11) and all 50 states
    return parseInt(state, 10) <= 56;
  });

  const proj = d3.geoAlbersUsa().fitSize([W, H], states);
  const path = d3.geoPath(proj);

  // Counties layer
  svg.append('g').attr('id', 'counties-layer')
    .selectAll('path')
    .data(valid)
    .join('path')
    .attr('class', 'county-metro')
    .attr('d', path)
    .attr('data-fips', d => String(d.id).padStart(5, '0'))
    .on('mousemove', function(ev, d) {
      const fips = String(d.id).padStart(5, '0');
      // Find the metro that contains this county; show its name if it's been
      // credited, OR if the quiz has ended (so missed metros are revealed too).
      let label = null;
      if (quizState && quizState.kind === 'metros100') {
        for (let i = 0; i < METROS100.length; i++) {
          if (METROS100[i][3].includes(fips)) {
            if (quizState.got.has(i) || quizState.phase === 'ended') {
              label = METROS100[i][0].split(',')[0];
            }
            break;
          }
        }
      }
      if (label) {
        const tip = document.getElementById('tip');
        tip.textContent = label;
        tip.style.left = (ev.clientX + 12) + 'px';
        tip.style.top  = (ev.clientY + 12) + 'px';
        tip.classList.add('show');
      }
    })
    .on('mouseout', () => document.getElementById('tip').classList.remove('show'));

  // State borders on top (all state-to-state arcs + outer perimeter)
  svg.append('path')
    .datum(topojson.mesh(us, us.objects.states))
    .attr('class', 'state-border')
    .attr('d', path);
}

async function startCapitalsQuiz(continent) {
  const items = continent === 'all'
    ? CAPITALS.slice()
    : CAPITALS.filter(([n, iso]) => CONTINENT_OF[iso] === continent);

  const title = continent === 'all'
    ? 'World Capitals'
    : `${continent} Capitals`;

  renderQuizShell({
    title,
    totalCount: items.length,
    mapId: 'world-map',
    hasDifficulty: false
  });
  document.getElementById('main').insertAdjacentHTML('afterbegin',
    '<div class="loading" id="ld">Loading map…</div>');

  // keyMap: capital name + aliases -> [item index]
  const keyMap = new Map();
  const addKey = (k, i) => {
    if (!keyMap.has(k)) keyMap.set(k, []);
    if (!keyMap.get(k).includes(i)) keyMap.get(k).push(i);
  };
  items.forEach(([name, iso, aliases], i) => {
    addKey(norm(name), i);
    (aliases || []).forEach(a => addKey(norm(a), i));
  });

  quizState = {
    kind: 'capitals',
    continent,
    items,
    got: new Set(),
    keyMap,
    elapsedMs: 0,
    runStartedAt: 0,
    timerId: null,
    phase: 'idle',
    difficulty: 'easy',
    hasDifficulty: false,
    isoToIdx: new Map(items.map(([n, iso], i) => [iso, i])),
  };

  try {
    const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
    document.getElementById('ld')?.remove();
    drawCapitalsMap(world, continent, items);
    renderRankTable('capitals', items.map((c, i) => ({
      idx: i, name: c[0], pop: c[3] || 0
    })), continent === 'all'
      ? 'Capitals by City Population'
      : `${continent} Capitals by City Population`);
    wireInputs();
    wireStartPause();
    updateStats();
    updatePills(false);
  } catch (e) {
    console.error('Capitals quiz load error:', e);
    const ld = document.getElementById('ld');
    if (ld) ld.innerHTML = 'Failed to load world map: ' + e.message;
  }
}

function drawCapitalsMap(world, continent, items) {
  const svg = d3.select('#world-map');
  const W = 960, H = continent === 'all' ? 500 : 540;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  const allFeatures = topojson.feature(world, world.objects.countries).features;

  let visibleFeatures;
  let proj;

  if (continent === 'all') {
    visibleFeatures = allFeatures;
    proj = d3.geoNaturalEarth1()
      .fitSize([W, H], { type: 'FeatureCollection', features: allFeatures });
  } else {
    // Only draw country polygons for this continent
    const continentISOs = new Set();
    COUNTRIES.forEach(([n, iso]) => {
      if (CONTINENT_OF[iso] === continent) continentISOs.add(iso);
    });
    visibleFeatures = allFeatures.filter(f => {
      const iso = String(f.id).padStart(3, '0');
      return continentISOs.has(iso);
    });

    // Hand-tuned bounding box per continent. Computed scale + center analytically
    // (not via d3.fitSize, which mis-fits Polygon geometries).
    // bbox = [west, south, east, north] in degrees. For Oceania we rotate the
    // projection so the antimeridian is in the middle, and supply a bbox in
    // post-rotation coordinates.
    const VIEWS = {
      'Europe':        { bbox: [-25, 34,  42, 68] },
      'Africa':        { bbox: [-22, -38, 60, 38] },
      'Asia':          { bbox: [ 30, -12, 148, 56] },
      'North America': { bbox: [-128, 7,  -55, 58] },
      'South America': { bbox: [-82, -56, -34, 13] },
      'Oceania':       { bbox: [-50, -47, 12, 18], rotate: [-180, 0] },
    };

    const v = VIEWS[continent];
    const [w, s, e, n] = v.bbox;
    const rotate = v.rotate || [0, 0];

    // --- Manual Mercator fit ---
    // Mercator-y for a given latitude (in radians of arc):
    //   y(φ) = ln(tan(π/4 + φ/2))
    const toRad = d => d * Math.PI / 180;
    const yS = Math.log(Math.tan(Math.PI/4 + toRad(s)/2));
    const yN = Math.log(Math.tan(Math.PI/4 + toRad(n)/2));
    const dx = toRad(e - w);          // lon span in radians
    const dy = yN - yS;               // y span in Mercator radians
    // Pixel-per-radian scale to fit either the width or the height (whichever
    // hits the viewport edge first), with a tiny pad for breathing room.
    const pad = 16;
    const scale = Math.min((W - 2*pad) / dx, (H - 2*pad) / dy);
    // Visual midpoint (Mercator y center -> back to latitude)
    const cyMerc = (yS + yN) / 2;
    const cLat = Math.atan(Math.sinh(cyMerc)) * 180 / Math.PI;
    const cLon = (w + e) / 2;

    proj = d3.geoMercator()
      .rotate(rotate)
      .center([cLon, cLat])
      .scale(scale)
      .translate([W / 2, H / 2]);
  }

  const path = d3.geoPath(proj);

  svg.selectAll('path.country')
    .data(visibleFeatures)
    .join('path')
    .attr('class', 'country')
    .attr('d', path)
    .attr('data-iso', d => String(d.id).padStart(3, '0'))
    .on('mousemove', function(ev, d) {
      const iso = String(d.id).padStart(3, '0');
      const idx = quizState.isoToIdx.get(iso);
      if (idx != null && (quizState.got.has(idx) || quizState.phase === 'ended')) {
        const tip = document.getElementById('tip');
        const cap = quizState.items[idx][0];
        let countryName = '';
        for (const [name, ci] of COUNTRIES) {
          if (ci === iso) { countryName = name; break; }
        }
        tip.innerHTML = `<b>${cap}</b>` + (countryName ? `<br><span style="opacity:.7">${countryName}</span>` : '');
        tip.style.left = (ev.clientX + 12) + 'px';
        tip.style.top  = (ev.clientY + 12) + 'px';
        tip.classList.add('show');
      }
    })
    .on('mouseout', () => document.getElementById('tip').classList.remove('show'));

  svg.append('g').attr('id', 'cap-dots');
  quizState.proj = proj;
}

function placeCapitalDot(item, missed) {
  const [name, iso, aliases, pop, lat, lon] = item;
  const pt = quizState.proj([lon, lat]);
  if (!pt) return;
  const svg = d3.select('#world-map #cap-dots');
  if (svg.empty()) return;
  const r = missed
    ? 2.6
    : (pop > 5000000 ? 6 : pop > 1000000 ? 4.6 : pop > 200000 ? 3.6 : 2.8);
  const dot = svg.append('circle')
    .attr('class', 'city-dot' + (missed ? ' missed' : ''))
    .attr('cx', pt[0])
    .attr('cy', pt[1])
    .attr('r', missed ? 2.4 : 0);
  if (!missed) {
    dot.transition().duration(250).attr('r', r);
  }
  dot.on('mousemove', (ev) => {
    const tip = document.getElementById('tip');
    const popStr = pop ? ` — ${pop.toLocaleString()}` : '';
    tip.textContent = `${name}${popStr}`;
    tip.style.left = (ev.clientX + 12) + 'px';
    tip.style.top  = (ev.clientY + 12) + 'px';
    tip.classList.add('show');
  }).on('mouseout', () => document.getElementById('tip').classList.remove('show'));
}

async function startCityQuiz({ title, items, kind, withStateGrid, hasDifficulty }) {
  renderQuizShell({
    title,
    totalCount: items.length,
    mapId: 'us-map',
    hasDifficulty: !!hasDifficulty
  });
  document.getElementById('main').insertAdjacentHTML('afterbegin',
    '<div class="loading" id="ld">Loading US map…</div>');

  const keyMap = new Map();
  items.forEach((c, i) => {
    const [name, state] = c;
    const stateLower = state.toLowerCase();
    const stateFull = STATE_FULL[state] || stateLower;
    const bareName = name.replace(/\s*\([^)]*\)\s*/g, '').trim();
    const nameVariants = bareName && bareName !== name ? [name, bareName] : [name];
    const keys = [];
    nameVariants.forEach(nv => {
      keys.push(norm(nv));
      keys.push(norm(nv + ' ' + state));
      keys.push(norm(nv + ' ' + stateFull));
      keys.push(norm(state + ' ' + nv));
    });
    keys.forEach(k => {
      if (!keyMap.has(k)) keyMap.set(k, []);
      if (!keyMap.get(k).includes(i)) keyMap.get(k).push(i);
    });
  });

  quizState = {
    kind,
    items,
    got: new Set(),
    keyMap,
    elapsedMs: 0,
    runStartedAt: 0,
    timerId: null,
    phase: 'idle',
    difficulty: 'easy',
    hasDifficulty: !!hasDifficulty
  };

  try {
    const atlasUrl = (kind === 'sc200' || kind === 'lowcountry')
      ? 'https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json'
      : 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json';
    const us = await fetch(atlasUrl).then(r=>r.json());
    document.getElementById('ld')?.remove();
    if (kind === 'sc200') drawSCMap(us);
    else if (kind === 'lowcountry') drawLowcountryMap(us);
    else drawUSMap(us);
    if (withStateGrid) renderStateGrid();
    if (kind === 'top200') {
      renderStateBreakdown(items);
    }
    if (kind === 'lowcountry') {
      renderCountyBreakdown(items);
    }
    if (kind === 'top200' || kind === 'sc200') {
      renderRankTable('cities', items.map((c, i) => ({
        idx: i, name: `${c[0]}, ${c[1]}`, pop: c[2]
      })), kind === 'sc200' ? 'Every SC City & Town by Population' : 'US Cities by Population (2024 Est.)');
    }
    if (kind === 'lowcountry') {
      renderRankTable('cities', items.map((c, i) => ({
        idx: i, name: c[0], pop: c[2]
      })), 'Lowcountry Places by Population');
    }
    wireInputs();
    wireStartPause();
    if (hasDifficulty) wireDifficulty();
    updateStats();
    updatePills(false);
  } catch (e) {
    document.getElementById('ld').textContent = 'Failed to load map: ' + e.message;
  }
}

function renderStateGrid() {
  const main = document.getElementById('main');
  const grid = document.createElement('div');
  grid.className = 'state-grid';
  grid.id = 'state-grid';

  const byState = new Map();
  quizState.items.forEach((item, i) => {
    const st = item[1];
    if (!byState.has(st)) byState.set(st, []);
    byState.get(st).push({ item, i });
  });

  const sortedStates = [...byState.keys()].sort((a, b) =>
    (STATE_FULL[a] || a).localeCompare(STATE_FULL[b] || b));

  sortedStates.forEach(st => {
    const cell = document.createElement('div');
    cell.className = 'state-cell';
    cell.innerHTML = `<div class="st-name">${toTitleCase(STATE_FULL[st] || st)}</div>`;
    byState.get(st).forEach(({ item, i }) => {
      const slot = document.createElement('div');
      slot.className = 'st-slot';
      slot.dataset.itemIdx = i;
      slot.textContent = '\u00a0';
      cell.appendChild(slot);
    });
    grid.appendChild(cell);
  });

  main.appendChild(grid);
}

function toTitleCase(s) {
  return s.replace(/\b\w/g, c => c.toUpperCase());
}

function fmtPop(n) {
  if (n == null || n === 0) return '';
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return Math.round(n/1e3) + 'K';
  return String(n);
}

function renderRankTable(kind, entries, title) {
  const sorted = entries.slice().sort((a, b) => (b.pop || 0) - (a.pop || 0));
  const ranked = sorted.map((e, rank) => ({...e, rank: rank + 1}));
  const colCount = 3;
  const perCol = Math.ceil(ranked.length / colCount);
  const cols = [];
  for (let c = 0; c < colCount; c++) {
    cols.push(ranked.slice(c * perCol, (c + 1) * perCol));
  }

  const main = document.getElementById('main');
  const wrap = document.createElement('div');
  wrap.className = 'rank-table';
  wrap.id = 'rank-table';
  wrap.innerHTML = `<h3>${title}</h3><div class="rank-cols"></div>`;
  const colsEl = wrap.querySelector('.rank-cols');
  cols.forEach(col => {
    const colEl = document.createElement('div');
    col.forEach(e => {
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.dataset.itemIdx = e.idx;
      row.innerHTML = `
        <span class="r-n">${e.rank}</span>
        <span class="r-name">—</span>
        <span class="r-pop">${fmtPop(e.pop)}</span>
      `;
      row.dataset.name = e.name;
      colEl.appendChild(row);
    });
    colsEl.appendChild(colEl);
  });
  main.appendChild(wrap);
}

function renderContinentBreakdown() {
  const totals = {};
  CONTINENT_ORDER.forEach(c => totals[c] = { total: 0, indices: [] });
  COUNTRIES.forEach(([name, iso], i) => {
    const cont = CONTINENT_OF[iso];
    if (cont && totals[cont]) {
      totals[cont].total++;
      totals[cont].indices.push(i);
    }
  });

  const main = document.getElementById('main');
  const wrap = document.createElement('div');
  wrap.className = 'continent-breakdown';
  wrap.id = 'continent-breakdown';
  wrap.innerHTML = `<h3>Countries by Continent</h3><div class="cb-grid" id="cb-grid"></div>`;
  const grid = wrap.querySelector('#cb-grid');
  CONTINENT_ORDER.forEach(cont => {
    const info = totals[cont];
    const cell = document.createElement('div');
    cell.className = 'cb-cell';
    cell.dataset.continent = cont;
    cell.dataset.total = info.total;
    cell.innerHTML = `
      <span class="cb-name">${cont}</span>
      <span class="cb-count"><span class="cb-got">0</span> / ${info.total}</span>
      <span class="cb-left"><span class="cb-remaining">${info.total}</span> left</span>
    `;
    grid.appendChild(cell);
  });
  main.appendChild(wrap);
}

function updateContinentBreakdown() {
  const grid = document.getElementById('cb-grid');
  if (!grid) return;
  const { items, got } = quizState;
  const counts = {};
  CONTINENT_ORDER.forEach(c => counts[c] = 0);
  got.forEach(i => {
    const iso = items[i][1];
    const cont = CONTINENT_OF[iso];
    if (cont && counts[cont] != null) counts[cont]++;
  });
  grid.querySelectorAll('.cb-cell').forEach(cell => {
    const cont = cell.dataset.continent;
    const total = parseInt(cell.dataset.total, 10);
    const gotN = counts[cont] || 0;
    cell.querySelector('.cb-got').textContent = gotN;
    cell.querySelector('.cb-remaining').textContent = total - gotN;
    cell.classList.toggle('complete', gotN === total && total > 0);
  });
}

function renderStateBreakdown(items) {
  const totals = new Map();
  items.forEach((c, i) => {
    const st = c[1];
    if (!totals.has(st)) totals.set(st, { total: 0, indices: [] });
    totals.get(st).total++;
    totals.get(st).indices.push(i);
  });

  const sorted = [...totals.entries()].sort((a, b) => {
    if (b[1].total !== a[1].total) return b[1].total - a[1].total;
    return a[0].localeCompare(b[0]);
  });

  const main = document.getElementById('main');
  const wrap = document.createElement('div');
  wrap.className = 'state-breakdown';
  wrap.id = 'state-breakdown';
  wrap.innerHTML = `<h3>Cities by State</h3><div class="sb-grid" id="sb-grid"></div>`;
  const grid = wrap.querySelector('#sb-grid');
  sorted.forEach(([st, info]) => {
    const row = document.createElement('div');
    row.className = 'sb-row';
    row.dataset.state = st;
    row.dataset.total = info.total;
    row.innerHTML = `<span class="sb-abbr">${st}</span><span class="sb-count"><span class="sb-got">0</span>/${info.total}</span>`;
    grid.appendChild(row);
  });
  main.appendChild(wrap);
}

function updateStateBreakdown() {
  const grid = document.getElementById('sb-grid');
  if (!grid) return;
  const { items, got, kind } = quizState;
  const counts = new Map();
  got.forEach(i => {
    // Lowcountry items use a compound county string; use only the primary.
    const st = (kind === 'lowcountry') ? primaryCounty(items[i]) : items[i][1];
    counts.set(st, (counts.get(st) || 0) + 1);
  });
  grid.querySelectorAll('.sb-row').forEach(row => {
    const st = row.dataset.state;
    const total = parseInt(row.dataset.total, 10);
    const gotN = counts.get(st) || 0;
    row.querySelector('.sb-got').textContent = gotN;
    row.classList.remove('complete', 'partial');
    if (gotN === total) row.classList.add('complete');
    else if (gotN > 0) row.classList.add('partial');
  });
}

// For the Lowcountry quiz: a fixed 4-county breakdown. Cross-county places
// (e.g., Ladson, Summerville) are attributed to the first county listed
// in their county field, which we treat as the "primary".
const LC_COUNTIES = ['Charleston', 'Berkeley', 'Dorchester', 'Colleton'];

function primaryCounty(item) {
  // item[1] is e.g. "Charleston" or "Charleston/Berkeley/Dorchester"
  return String(item[1]).split('/')[0];
}

function renderCountyBreakdown(items) {
  const totals = new Map(LC_COUNTIES.map(c => [c, { total: 0, indices: [] }]));
  items.forEach((c, i) => {
    const cty = primaryCounty(c);
    if (totals.has(cty)) {
      totals.get(cty).total++;
      totals.get(cty).indices.push(i);
    }
  });

  const main = document.getElementById('main');
  const wrap = document.createElement('div');
  wrap.className = 'state-breakdown';
  wrap.id = 'state-breakdown';
  wrap.innerHTML = `<h3>Places by County</h3><div class="sb-grid" id="sb-grid"></div>`;
  const grid = wrap.querySelector('#sb-grid');
  LC_COUNTIES.forEach(cty => {
    const info = totals.get(cty);
    const row = document.createElement('div');
    row.className = 'sb-row';
    row.dataset.state = cty;  // reuse 'state' attr for compatibility
    row.dataset.total = info.total;
    row.innerHTML = `<span class="sb-abbr">${cty}</span><span class="sb-count"><span class="sb-got">0</span>/${info.total}</span>`;
    grid.appendChild(row);
  });
  main.appendChild(wrap);
}

function drawUSMap(us) {
  const svg = d3.select('#us-map');
  const W = 960, H = 600;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  const states = topojson.feature(us, us.objects.states);
  const proj = d3.geoAlbersUsa().fitSize([W, H], states);
  const path = d3.geoPath(proj);

  svg.selectAll('path.state')
    .data(states.features)
    .join('path')
    .attr('class', 'state')
    .attr('d', path);

  svg.append('g').attr('id', 'dots');
  quizState.proj = proj;
}

function drawSCMap(us) {
  const svg = d3.select('#us-map');
  const W = 960, H = 640;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  const allCounties = topojson.feature(us, us.objects.counties);
  const scCounties = {
    type: 'FeatureCollection',
    features: allCounties.features.filter(f => String(f.id).startsWith('45'))
  };
  if (scCounties.features.length === 0) {
    console.error('No SC counties found in atlas');
    return;
  }

  const scStateMesh = topojson.merge(
    us,
    us.objects.counties.geometries.filter(g => String(g.id).startsWith('45'))
  );

  const scInteriorMesh = topojson.mesh(
    us,
    us.objects.counties,
    (a, b) => a !== b && String(a.id).startsWith('45') && String(b.id).startsWith('45')
  );

  const proj = d3.geoMercator().fitExtent([[16, 16], [W - 16, H - 16]], scStateMesh);
  const path = d3.geoPath(proj);

  svg.append('path')
    .datum(scStateMesh)
    .attr('class', 'state')
    .attr('d', path)
    .attr('stroke', 'none');

  svg.append('path')
    .datum(scInteriorMesh)
    .attr('fill', 'none')
    .attr('stroke', 'var(--map-line)')
    .attr('stroke-width', 0.6)
    .attr('stroke-linejoin', 'round')
    .attr('d', path);

  svg.append('path')
    .datum(scStateMesh)
    .attr('fill', 'none')
    .attr('stroke', 'var(--line)')
    .attr('stroke-width', 1.4)
    .attr('stroke-linejoin', 'round')
    .attr('d', path);

  svg.append('g')
    .attr('id', 'sc-county-hover')
    .selectAll('path')
    .data(scCounties.features)
    .join('path')
    .attr('d', path)
    .attr('fill', 'transparent')
    .attr('stroke', 'none')
    .attr('pointer-events', 'all')
    .on('mousemove', function(ev, d) {
      const tip = document.getElementById('tip');
      tip.textContent = (d.properties && d.properties.name ? d.properties.name : 'County') + ' County';
      tip.style.left = (ev.clientX + 12) + 'px';
      tip.style.top  = (ev.clientY + 12) + 'px';
      tip.classList.add('show');
    })
    .on('mouseout', () => document.getElementById('tip').classList.remove('show'));

  svg.append('g').attr('id', 'dots');
  quizState.proj = proj;
}

function drawLowcountryMap(us) {
  const svg = d3.select('#us-map');
  const W = 960, H = 720;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  // 4 Lowcountry counties: Charleston (45019), Berkeley (45015),
  // Dorchester (45035), Colleton (45029)
  const LC_FIPS = new Set(['45019', '45015', '45035', '45029']);
  const allCounties = topojson.feature(us, us.objects.counties);
  const lcCounties = {
    type: 'FeatureCollection',
    features: allCounties.features.filter(f => LC_FIPS.has(String(f.id).padStart(5, '0')))
  };
  if (lcCounties.features.length === 0) {
    console.error('No Lowcountry counties found in atlas');
    return;
  }

  // Merged outline of all 4 counties (used for fitting + outer border)
  const lcMergeMesh = topojson.merge(
    us,
    us.objects.counties.geometries.filter(g => LC_FIPS.has(String(g.id).padStart(5, '0')))
  );

  // Interior county-to-county boundaries (within our 4)
  const lcInteriorMesh = topojson.mesh(
    us,
    us.objects.counties,
    (a, b) => a !== b
      && LC_FIPS.has(String(a.id).padStart(5, '0'))
      && LC_FIPS.has(String(b.id).padStart(5, '0'))
  );

  const proj = d3.geoMercator().fitExtent([[16, 16], [W - 16, H - 16]], lcMergeMesh);
  const path = d3.geoPath(proj);

  // Filled background of the 4-county region
  svg.append('path')
    .datum(lcMergeMesh)
    .attr('class', 'state')
    .attr('d', path)
    .attr('stroke', 'none');

  // Interior county lines (lighter)
  svg.append('path')
    .datum(lcInteriorMesh)
    .attr('fill', 'none')
    .attr('stroke', 'var(--map-line)')
    .attr('stroke-width', 0.8)
    .attr('stroke-linejoin', 'round')
    .attr('d', path);

  // Outer perimeter (thicker, darker)
  svg.append('path')
    .datum(lcMergeMesh)
    .attr('fill', 'none')
    .attr('stroke', 'var(--line)')
    .attr('stroke-width', 1.4)
    .attr('stroke-linejoin', 'round')
    .attr('d', path);

  // Hover layer — show county name when hovering an area without a dot
  svg.append('g')
    .attr('id', 'lc-county-hover')
    .selectAll('path')
    .data(lcCounties.features)
    .join('path')
    .attr('d', path)
    .attr('fill', 'transparent')
    .attr('stroke', 'none')
    .attr('pointer-events', 'all')
    .on('mousemove', function(ev, d) {
      const tip = document.getElementById('tip');
      tip.textContent = (d.properties && d.properties.name ? d.properties.name : 'County') + ' County';
      tip.style.left = (ev.clientX + 12) + 'px';
      tip.style.top  = (ev.clientY + 12) + 'px';
      tip.classList.add('show');
    })
    .on('mouseout', () => document.getElementById('tip').classList.remove('show'));

  svg.append('g').attr('id', 'dots');
  quizState.proj = proj;
}

function placeCityDot(cityArr, missed=false) {
  const [name, state, pop, lat, lon] = cityArr;
  const pt = quizState.proj([lon, lat]);
  if (!pt) return;
  const svg = d3.select('#us-map #dots');
  const r = missed ? 2.6 : (pop > 1000000 ? 6 : pop > 500000 ? 4.8 : pop > 200000 ? 3.8 : 3);
  const dot = svg.append('circle')
    .attr('class', 'city-dot' + (missed ? ' missed' : ''))
    .attr('cx', pt[0])
    .attr('cy', pt[1])
    .attr('r', missed ? 2.4 : 0);
  if (!missed) {
    dot.transition().duration(250).attr('r', r);
  }
  dot.on('mousemove', (ev) => {
    const tip = document.getElementById('tip');
    // Lowcountry: state field is a county string (possibly compound) — show
    // just the primary county with " Co." suffix instead.
    const stateLabel = (quizState && quizState.kind === 'lowcountry')
      ? `${primaryCounty(cityArr)} Co.`
      : state;
    tip.textContent = `${name}, ${stateLabel} — ${pop.toLocaleString()}`;
    tip.style.left = (ev.clientX + 12) + 'px';
    tip.style.top  = (ev.clientY + 12) + 'px';
    tip.classList.add('show');
  }).on('mouseout', () => document.getElementById('tip').classList.remove('show'));
}

/* =========================================================================
   INPUT HANDLING + START / PAUSE / DIFFICULTY
   ========================================================================= */
function wireInputs() {
  const ans = document.getElementById('ans');
  ans.oninput = () => {
    if (!quizState || quizState.phase !== 'running') return;
    const raw = ans.value;
    const tryText = norm(raw);
    if (!tryText) return;
    const hits = tryMatch(tryText);
    if (hits === null) return;

    if (isPrefixOfOtherKey(tryText)) {
      clearTimeout(wireInputs._pt);
      wireInputs._pt = setTimeout(() => {
        if (norm(ans.value) !== tryText) return;
        commitHits(hits, raw);
      }, 150);
      return;
    }
    clearTimeout(wireInputs._pt);
    commitHits(hits, raw);
  };
  ans.onkeydown = (e) => {
    if (e.key === 'Enter') {
      if (!quizState || quizState.phase !== 'running') return;
      clearTimeout(wireInputs._pt);
      const tryText = norm(ans.value);
      if (!tryText) return;
      const hits = tryMatch(tryText);
      if (hits && hits.length > 0) {
        commitHits(hits, ans.value);
      } else if (hits === null) {
        flash('Not on the list', 'bad');
      } else {
        ans.value = '';
      }
    }
  };
  document.getElementById('restart').onclick = () => setMode(currentMode);
  document.getElementById('giveup').onclick = () => {
    if (!quizState || quizState.phase === 'ended' || quizState.phase === 'idle') return;
    if (confirm('End the quiz and reveal missed answers?')) endQuiz('Gave up.');
  };
}

function wireStartPause() {
  const startBtn = document.getElementById('startbtn');
  const pauseBtn = document.getElementById('pausebtn');
  const ans = document.getElementById('ans');
  const overlay = document.getElementById('map-overlay');

  startBtn.onclick = () => {
    if (!quizState) return;
    if (quizState.phase === 'idle') {
      // First-time start
      startTimer();
      ans.disabled = false;
      ans.placeholder = '...';
      ans.focus();
      overlay.style.display = 'none';
      pauseBtn.disabled = false;
      document.getElementById('giveup').disabled = false;
      document.getElementById('restart').disabled = false;
      startBtn.disabled = true;
      // Lock the difficulty toggle now
      document.querySelectorAll('#difficulty button').forEach(b => b.disabled = true);
      updateDifficultyTag();
      applyDifficultyVisibility();
    }
  };

  pauseBtn.onclick = () => {
    if (!quizState) return;
    if (quizState.phase === 'running') {
      pauseTimer();
      ans.disabled = true;
      pauseBtn.textContent = 'Resume';
      // Show overlay (only meaningful in easy mode where map is visible)
      if (!(quizState.hasDifficulty && quizState.difficulty === 'hard')) {
        overlay.style.display = 'flex';
        overlay.querySelector('.ov-title').textContent = 'Paused';
        overlay.querySelector('.ov-msg').innerHTML = 'Press <strong>Resume</strong> to continue.';
      }
    } else if (quizState.phase === 'paused') {
      resumeTimer();
      ans.disabled = false;
      ans.focus();
      pauseBtn.textContent = 'Pause';
      overlay.style.display = 'none';
    }
  };
}

function wireDifficulty() {
  const cont = document.getElementById('difficulty');
  const help = document.getElementById('difficulty-help');
  if (!cont) return;
  const setHelp = (diff) => {
    if (diff === 'easy') {
      help.textContent = 'Map fills in as you go. Reveals missed answers at the end.';
    } else {
      help.textContent = 'Map and answer lists hidden until quiz ends. Score counter only.';
    }
  };
  setHelp('easy');
  cont.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      if (!quizState || quizState.phase !== 'idle') return; // can't change mid-quiz
      const diff = b.dataset.diff;
      cont.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      quizState.difficulty = diff;
      setHelp(diff);
    };
  });
}

function commitHits(hits, raw) {
  const ans = document.getElementById('ans');
  if (hits.length === 0) {
    ans.value = '';
    return;
  }
  ans.value = '';
  hits.forEach(i => creditIndex(i));
}

function isPrefixOfOtherKey(normText) {
  for (const k of quizState.keyMap.keys()) {
    if (k !== normText && k.startsWith(normText)) return true;
  }
  return false;
}

function tryMatch(normText) {
  const idxs = quizState.keyMap.get(normText);
  if (!idxs) return null;
  const newly = [];
  for (const i of idxs) {
    if (!quizState.got.has(i)) newly.push(i);
  }
  return newly;
}

function creditIndex(i) {
  quizState.got.add(i);
  const item = quizState.items[i];
  const isHardActive = quizState.hasDifficulty && quizState.difficulty === 'hard';
  if (quizState.kind === 'countries') {
    const [name, iso] = item;
    // Always update the SVG class — even if hidden — so it's there at reveal
    d3.selectAll(`path.country[data-iso="${iso}"]`).classed('answered', true);
    for (const [terrIso, ownerIso] of Object.entries(DISPUTED_TERRITORIES)) {
      if (ownerIso === iso) {
        d3.selectAll(`path.country[data-iso="${terrIso}"]`).classed('answered', true);
      }
    }
    if (!isHardActive) flash(name, 'good');
  } else if (quizState.kind === 'capitals') {
    const [name, iso] = item;
    placeCapitalDot(item, false);
    // Light shade on the country
    d3.selectAll(`path.country[data-iso="${iso}"]`).classed('capital-answered', true);
    flash(name, 'good');
  } else if (quizState.kind === 'metros100') {
    const [name, pop, aliases, fips] = item;
    fips.forEach(f => {
      d3.selectAll(`path.county-metro[data-fips="${f}"]`).classed('answered', true);
    });
    if (!isHardActive) flash(name.split(',')[0], 'good');
  } else {
    const [name, state] = item;
    // Only paint the dot in easy mode; in hard mode we'll repaint on reveal
    if (!isHardActive) {
      placeCityDot(item, false);
      // For Lowcountry, the "state" field is a county string (possibly compound).
      // Just show the place name + primary county for readability.
      const flashLabel = (quizState.kind === 'lowcountry')
        ? `${name}, ${primaryCounty(item)} Co.`
        : `${name}, ${state}`;
      flash(flashLabel, 'good');
    }
    const slot = document.querySelector(`#state-grid .st-slot[data-item-idx="${i}"]`);
    if (slot) {
      const pop = item[2];
      slot.innerHTML = `${name}<span class="st-pop">${fmtPop(pop)}</span>`;
      slot.classList.add('got');
    }
  }
  // Rank table row reveal — only in easy mode (in hard, rows hidden until end)
  if (!isHardActive) {
    const row = document.querySelector(`#rank-table .rank-row[data-item-idx="${i}"]`);
    if (row) {
      row.classList.add('got');
      row.querySelector('.r-name').textContent = row.dataset.name;
    }
  }
  updateStats();
  if (!isHardActive) {
    updatePills(false);
    updateStateBreakdown();
    updateContinentBreakdown();
  }
  if (quizState.got.size === quizState.items.length) {
    endQuiz('Complete! You got them all.');
  }
}

function revealMissed() {
  const { items, got, kind } = quizState;
  items.forEach((item, i) => {
    if (got.has(i)) return;
    if (kind === 'countries') {
      const iso = item[1];
      d3.selectAll(`path.country[data-iso="${iso}"]`).classed('missed', true);
      for (const [terrIso, ownerIso] of Object.entries(DISPUTED_TERRITORIES)) {
        if (ownerIso === iso) {
          d3.selectAll(`path.country[data-iso="${terrIso}"]`).classed('missed', true);
        }
      }
    } else if (kind === 'capitals') {
      placeCapitalDot(item, true);
    } else if (kind === 'metros100') {
      const fips = item[3];
      fips.forEach(f => {
        d3.selectAll(`path.county-metro[data-fips="${f}"]:not(.answered)`).classed('missed', true);
      });
    } else {
      placeCityDot(item, true);
      const slot = document.querySelector(`#state-grid .st-slot[data-item-idx="${i}"]`);
      if (slot) {
        const pop = item[2];
        slot.innerHTML = `${item[0]}<span class="st-pop">${fmtPop(pop)}</span>`;
        slot.classList.add('missed');
      }
    }
    const row = document.querySelector(`#rank-table .rank-row[data-item-idx="${i}"]`);
    if (row) {
      row.classList.add('missed');
      row.querySelector('.r-name').textContent = row.dataset.name;
    }
  });
}

function updatePills(finalReveal) {
  const { items, got, kind } = quizState;
  const container = document.getElementById('pills');
  if (!container) return;
  const nameOf = (item) => {
    if (kind === 'countries') return item[0];
    if (kind === 'capitals') return item[0];
    if (kind === 'metros100') return item[0].split(',')[0];
    if (kind === 'lowcountry') return item[0];
    return `${item[0]}, ${item[1]}`;
  };
  if (!finalReveal) {
    const gotArr = [...got].reverse();
    if (gotArr.length === 0) {
      container.innerHTML = '<span style="color:var(--ink-soft);font-family:JetBrains Mono,monospace;font-size:12px">Correct answers appear here…</span>';
      return;
    }
    container.innerHTML = gotArr.map(i => {
      return `<span class="pill got">${nameOf(items[i])}</span>`;
    }).join('');
    return;
  }
  const html = items.map((item, i) => {
    const name = nameOf(item);
    if (got.has(i)) return `<span class="pill got">${name}</span>`;
    return `<span class="pill missed">${name}</span>`;
  }).join('');
  container.innerHTML = html;
}
